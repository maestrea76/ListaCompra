name: Brand icons

# Rasteriza brand/icon.svg a los PNG de marca (icon.png 256x256,
# icon@2x.png 512x512) y los commitea en custom_components/tucompra/brand/.
# Desde HA 2026.3 las integraciones sirven su propio icono desde ahí (viaja en
# el release, se ve al instalar). No hace falta Node/imagemagick en local.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - brand/icon.svg
      - .github/workflows/brand-icons.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Rasterizar PNGs
        run: |
          mkdir -p custom_components/tucompra/brand
          rsvg-convert -w 256 -h 256 brand/icon.svg -o custom_components/tucompra/brand/icon.png
          rsvg-convert -w 512 -h 512 brand/icon.svg -o custom_components/tucompra/brand/icon@2x.png

      - name: Commit de los PNG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/tucompra/brand/icon.png custom_components/tucompra/brand/icon@2x.png
          git diff --staged --quiet || git commit -m "chore(brand): render icon PNGs [skip ci]"
          git push

name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write    # write para que el step de fast-forward pueda
  pages: write       # actualizar la rama v0.2 a la última de main.
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (con base /ListaCompra)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Mantiene la rama v0.2 al día con main automáticamente.
      # Sólo se ejecuta cuando el push viene de la rama main, para no
      # tirar para atrás v0.2 si en el futuro lanzamos manualmente el
      # workflow desde otra rama.
      - name: Fast-forward branch v0.2 a main
        if: github.ref == 'refs/heads/main'
        run: git push origin HEAD:refs/heads/v0.2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

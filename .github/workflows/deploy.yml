name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write    # write para que el step de fast-forward pueda
  pages: write       # actualizar la rama v0.2 a la última de main.
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # Historia completa para que git pueda verificar fast-forward
          # al actualizar la rama v0.2.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (con base /ListaCompra)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Mantiene la rama v0.2 al día con main automáticamente.
      # - 'continue-on-error: true' evita que un fallo aquí rompa el
      #   deploy (la rama v0.2 es sólo un mirror; si falla la actualización
      #   no es crítico).
      # - '--force-with-lease' fuerza la actualización siempre que el
      #   estado remoto sea el que esperamos (evita atropellar cambios
      #   ajenos hipotéticos).
      - name: Fast-forward branch v0.2 a main
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: git push --force-with-lease origin HEAD:refs/heads/v0.2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

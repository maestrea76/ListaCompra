name: Validate

# Validación que exige HACS para entrar en su lista por defecto:
#  - hacs/action: estructura del repo + manifest + presencia en brands.
#  - hassfest (Home Assistant): valida el manifest.json de la integración.
# Se ejecuta en cada push/PR y a diario (por si cambia la validación de HACS).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # `npm install`, no `npm ci`: el repo no tiene package-lock.json y ci lo
      # exige. Es lo que usan deploy.yml y release.yml.
      - run: npm install
      # Genera catalog.json para que la prueba pueda comprobar que lleva los
      # seis idiomas y no solo el español.
      - run: npm run export:catalog
      - run: pip install pytest
      - run: pytest tests/ -q

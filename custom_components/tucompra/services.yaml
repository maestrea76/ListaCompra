add_item:
  name: Añadir producto
  description: >-
    Añade un producto a la lista por su nombre. Reconoce el producto con
    búsqueda difusa, deduce su tipo de tienda y lo coloca en la tienda por
    defecto de ese tipo (o en la bandeja "Por clasificar" si no puede decidir).
  fields:
    name:
      name: Producto
      description: Nombre del producto (p. ej. "papel higiénico").
      required: true
      example: papel higiénico
      selector:
        text:
    quantity:
      name: Cantidad
      description: Cantidad a añadir.
      example: 1
      default: 1
      selector:
        number:
          min: 0.1
          max: 999
          step: 0.1
          mode: box
    unit:
      name: Unidad
      description: Unidad de medida. Si se omite, se usa la del producto.
      example: unidad
      selector:
        select:
          options:
            - unidad
            - kg
            - g
            - l
            - ml
            - paquete
            - docena
            - caja
    share_id:
      name: Lista (share)
      description: >-
        Lista destino. Si se omite, usa la compartida (hogar) o, en su defecto,
        la personal.
      example: "shared:abc123def456"
      selector:
        text:
